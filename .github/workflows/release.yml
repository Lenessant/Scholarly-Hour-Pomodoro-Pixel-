name: Release

# Triggers when you push a version tag like: git tag v1.0.1 && git push origin v1.0.1
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write  # needed to create GitHub Releases

    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]  # add macos-latest / ubuntu-22.04 if needed later

    runs-on: ${{ matrix.platform }}

    steps:
      # 1. Check out your code
      - uses: actions/checkout@v4

      # 2. Install Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install Rust (required by Tauri)
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 4. Cache Rust builds so releases aren't slow every time
      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 5. Install your npm dependencies
      - name: Install dependencies
        run: npm install

      # 6. Build and publish the release to GitHub
      #    TAURI_SIGNING_PRIVATE_KEY comes from your GitHub repo secrets (next step)
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Scholar Hour ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download this version.'
          releaseDraft: false
          prerelease: false